<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0f172a" />
  <title>文化祭 採点</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2l2.9 5.9 6.5.9-4.7 4.6 1.1 6.5L12 16.8 6.2 19.9l1.1-6.5L2.6 8.8l6.5-.9L12 2z"/>
        </svg>
      </div>
      <div>
        <h1 id="title">文化祭 採点</h1>
        <div class="brand-sub">SCORING</div>
      </div>
    </div>
    <span class="pill" id="voterBadge">未設定</span>
  </header>

  <div class="container">
    <!-- 投票者の設定 -->
    <section class="card" id="setupCard">
      <div class="hero">
        <h2>採点をはじめる</h2>
        <p>気に入った出し物に点数をつけて応援しよう</p>
      </div>
      <div id="closedNotice" class="empty hidden" style="margin-top:6px">
        現在は投票を受け付けていません。<br>受付時間になったら、このページを開き直してください。
      </div>
      <div id="startArea">
      <div class="row" style="justify-content:center">
        <button id="visitorStartBtn" type="button" style="width:100%;max-width:420px;padding:16px 20px;font-size:1.08rem">来場者として採点をはじめる</button>
      </div>
      <p class="muted" style="text-align:center;margin:10px 0 0">生徒・保護者・一般のかたはこちら</p>
      <div style="text-align:center;margin-top:26px;padding-top:18px;border-top:1px solid rgba(148,163,184,.25)">
        <button class="ghost" id="judgeToggle" type="button" style="font-size:.9rem">文化祭採点委員（生徒会・教員）のかたはこちら</button>
      </div>
      <div id="judgeNameWrap" class="hidden">
        <label for="judgeName">お名前（採点委員）</label>
        <input id="judgeName" autocomplete="off" placeholder="例: 山田太郎" />
        <label for="judgeCode">採点委員コード</label>
        <input id="judgeCode" inputmode="numeric" autocomplete="off" placeholder="担当者から伝えられた6桁のコード" />
        <p class="muted" style="margin:8px 0 0">コードは運営の担当者にご確認ください。集計では同じお名前の採点は同一の採点委員として扱われます。</p>
        <div class="row" style="margin-top:18px; justify-content:center">
          <button id="startBtn" disabled style="min-width:220px">採点委員として採点をはじめる</button>
        </div>
      </div>
      </div>
    </section>

    <!-- 出し物一覧 -->
    <section class="card hidden" id="listCard">
      <h2 id="listTitle">出し物を選んで採点</h2>
      <p class="section-lead" id="listLead">採点済みの出し物はあとから何度でも修正できます。</p>
      <div class="progress-wrap">
        <div class="progress-bar"><div id="progressFill" style="width:0%"></div></div>
        <span class="progress-label" id="progressLabel">0 / 0</span>
      </div>
      <div class="item-grid" id="itemList"></div>
      <div id="surveyBanner" class="hidden" style="margin-top:20px;padding:16px;border:1px solid var(--line);border-radius:12px;background:var(--primary-soft)">
        <strong>文化祭アンケートにご協力ください</strong>
        <p class="muted" style="margin:6px 0 10px">1分で終わります。回答はあとから書き直せます。</p>
        <button class="secondary" type="button" id="openSurveyBtn">アンケートに答える</button>
      </div>
      <div class="row" style="margin-top:18px">
        <button class="ghost" id="changeVoterBtn">区分を変更する</button>
      </div>
    </section>

    <!-- アンケート -->
    <section class="card hidden" id="surveyCard">
      <button class="back-link" id="surveyBackBtn" type="button">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        一覧に戻る
      </button>
      <h2>文化祭アンケート</h2>
      <p class="section-lead">答えられる質問だけでOKです。送信後も書き直せます。</p>
      <div id="surveyForm"></div>
      <div class="row" style="margin-top:20px">
        <button id="submitSurvey" style="width:100%;max-width:420px;margin:0 auto">アンケートを送信</button>
      </div>
    </section>

    <!-- 採点フォーム -->
    <section class="card hidden" id="voteCard">
      <button class="back-link" id="backBtn" type="button">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        一覧に戻る
      </button>
      <h2 id="voteItemName" style="font-size:1.35rem"></h2>
      <p class="muted" id="voteItemDesc" style="margin-top:0"></p>
      <div id="criteriaForm"></div>
    </section>
  </div>

  <!-- 投票用の固定アクションバー -->
  <div class="action-bar hidden" id="actionBar">
    <div class="inner">
      <span class="status" id="voteStatus"></span>
      <button id="submitVote">この内容で投票</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="app.js"></script>
</body>
</html>
